name: Omni-Channel Tech Radar Auto-Crawler

on:
  schedule:
    # Runs exactly every 90 minutes (16 times per day)
    - cron: '0 0,3,6,9,12,15,18,21 * * *'
    - cron: '30 1,4,7,10,13,16,19,22 * * *'
  workflow_dispatch:
    inputs:
      loading_message_id:
        description: 'Telegram Message ID to delete upon completion'
        type: string
        required: false
jobs:
  crawl-and-score:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./backend

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: './backend/package-lock.json'

      - name: Install Dependencies
        run: npm install

      - name: Run Tech Radar Pipeline
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          EXA_API_KEY: ${{ secrets.EXA_API_KEY }}
          FIRECRAWL_API_KEY: ${{ secrets.FIRECRAWL_API_KEY }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          DISCORD_MACRO_WEBHOOK_URL: ${{ secrets.DISCORD_MACRO_WEBHOOK_URL }}
          DISCORD_REPO_WEBHOOK_URL: ${{ secrets.DISCORD_REPO_WEBHOOK_URL }}
          DISCORD_VIDEO_WEBHOOK_URL: ${{ secrets.DISCORD_VIDEO_WEBHOOK_URL }}
          DISCORD_LOGS_WEBHOOK_URL: ${{ secrets.DISCORD_LOGS_WEBHOOK_URL }}
          DISCORD_ALERTS_WEBHOOK_URL: ${{ secrets.DISCORD_ALERTS_WEBHOOK_URL }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          TELEGRAM_LOADING_MSG_ID: ${{ github.event.inputs.loading_message_id }}
        run: npm start

      - name: Report Pipeline Failure
        if: failure()
        run: |
          curl -H "Content-Type: application/json" -d '{"content":"🚨 **CRITICAL PIPELINE CRASH** - The GitHub Actions workflow failed at the environment level! Please inspect the logs immediately."}' ${{ secrets.DISCORD_CRASH_WEBHOOK_URL }}
          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" -d chat_id=${{ secrets.TELEGRAM_CHAT_ID }} -d parse_mode=HTML -d text="🚨 <b>Category: Critical Pipeline Crash</b> - The GitHub Actions runner failed."
